<!DOCTYPE html>
<html>

<meta name="viewport" content="width=device-width, initial-scale=1">

<head>
    <!-- Google Fonts: Sora (all weights used in the app) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <!-- Flutter TeX specific styles and scripts -->
    <link rel="stylesheet" href="flutter_tex.css" type="text/css">
    <script src="flutter_tex.js" type="text/javascript"></script>
    <script src="mathjax_core.js" id="MathJax-script"></script>

    <!-- Title of the document -->
    <title>Flutter TeX</title>

</head>

<body>

    <div id="TeXView"></div>

    <script>
        function renderTeXView(onCompleteCallback) {
            if (window.MathJax && window.MathJax.startup) {
                window.MathJax.startup.promise.then(() => {
                    return window.MathJax.typesetPromise([document.querySelector("#TeXView")]);
                }).then(() => {
                    onCompleteCallback();
                    console.log("MathJax typesetting complete.");
                }).catch((err) => {
                    console.error("Error during MathJax typesetting:", err);
                });
            } else {
                console.error("MathJax not loaded yet.");
            }
        }
    </script>

</body>

</html>
